
```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Day 3 - HTML Tables and Forms</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin: 20px;
}

h1,h2{
    text-align:center;
}

form{
    width:50%;
    margin:auto;
    padding:20px;
    border:1px solid #ccc;
    border-radius:10px;
}

label{
    display:block;
    margin-top:10px;
}

input, textarea{
    width:100%;
    padding:8px;
    margin-top:5px;
}

button{
    margin-top:15px;
    padding:10px 20px;
    cursor:pointer;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:30px;
}

table, th, td{
    border:1px solid black;
}

th, td{
    padding:10px;
    text-align:center;
}

caption{
    font-size:20px;
    font-weight:bold;
    margin-bottom:10px;
}

tfoot{
    background:#f0f0f0;
    font-weight:bold;
}
</style>
</head>

<body>

<h1>Student Registration Form</h1>

<form>

<label for="name">Student Name</label>
<input type="text" id="name">

<label for="email">Email</label>
<input type="email" id="email">

<label for="phone">Phone Number</label>
<input type="tel" id="phone">

<label for="course">Course</label>
<input type="text" id="course">

<label for="address">Address</label>
<textarea id="address" rows="4"></textarea>

<button type="submit">Register</button>

</form>

<h2>Student Data Table</h2>

<table>

<caption>Student Information</caption>

<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Course</th>
<th>Age</th>
<th>Marks</th>
</tr>
</thead>

<tbody>
<tr>
<td>101</td>
<td>Rahul</td>
<td>BCA</td>
<td>20</td>
<td>85</td>
</tr>

<tr>
<td>102</td>
<td>Priya</td>
<td>B.Tech</td>
<td>21</td>
<td>90</td>
</tr>

<tr>
<td>103</td>
<td>Aman</td>
<td>BBA</td>
<td>22</td>
<td>88</td>
</tr>
</tbody>

<tfoot>
<tr>
<td colspan="5">Total Students: 3</td>
</tr>
</tfoot>

</table>

</body>
</html>
```
